<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Path of Exile 2 Class Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body class="loading">
  <div id="loader">
    <div class="loader-wheel"></div>
  </div>

  <img src="images/poe2-logo.png" alt="Path of Exile 2" class="poe2-logo">

  <main>
    <h1>Path of Exile 2 Class Picker</h1>
    <img src="images/arrow.png" alt="" class="wheel-pointer" aria-hidden="true">
    <div class="wheel-container">
      <img src="images/ring.png" alt="" class="wheel-ring" aria-hidden="true">
      <canvas id="classWheel" width="1200" height="1200" aria-label="Class picker spinning wheel"></canvas>
    </div>
  </main>

  <div id="modeToggle" class="mode-toggle">
    <span class="mode-label tooltip">
      Classic
      <span class="tooltip-box">One spin. You get the class you land on.</span>
    </span>
    <img id="modeToggleImage" src="images/classic.png" alt="Mode Toggle">
    <span class="mode-label tooltip">
      Elimination
      <span class="tooltip-box">Each spin removes a class. Continue until only one remains.</span>
    </span>
  </div>

  <button id="restartButton" class="restart-button" type="button">Restart</button>

  <aside id="classSelectorPanel" class="class-selector-panel" aria-label="Class selection">
    <div class="frame-top"></div>
    <div class="frame-middle">
      <div id="classSelectorList" class="class-selector-list"></div>
      <button id="classSelectorToggle" class="class-selector-toggle" type="button">Deselect All</button>
    </div>
    <div class="frame-bottom"></div>
  </aside>

  <div id="modalOverlay" class="popup hidden">
    <div id="modalContent" class="popup-content">
      <div id="modalText" class="popup-title"></div>
      <div class="popup-portrait-wrapper">
        <img id="modalPortrait" class="popup-portrait" src="" alt="">
        <img src="images/frame.png" alt="" class="popup-portrait-frame" aria-hidden="true">
        <img id="bloodSplatter" src="images/blood.png" class="blood-splatter">
      </div>
      <div id="modalReminder" class="popup-reminder hidden">REMEMBER TO RESPECT THE WHEEL</div>
      <button id="modalOk" class="popup-button" type="button">
        <img src="images/ok.png" alt="" class="popup-button-bg" aria-hidden="true">
        <span>OK</span>
      </button>
      <button id="findBuildsBtn" class="gold-button find-builds-btn hidden" type="button">
        Find Builds
      </button>
    </div>
  </div>

  <a
    href="https://www.youtube.com/@Jazzarus_"
    target="_blank"
    class="yt-banner"
    rel="noopener"
  >
    <img src="images/banner.png" alt="" class="yt-banner-bg" aria-hidden="true">
    <img src="images/jazzarus-logo.png" alt="" class="yt-banner-wolf">
    <span class="yt-banner-name">Jazzarus</span>
    <img src="images/youtube-logo.png" alt="" class="yt-banner-yt">
  </a>

  <script src="script.js"></script>
</body>

</html>
